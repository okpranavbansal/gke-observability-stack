# kube-prometheus-stack Helm values
# Tuned for GKE Autopilot (no node-level access)

prometheus:
  prometheusSpec:
    retention: 15d
    retentionSize: "20GB"
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: 2
        memory: 8Gi
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: standard-rwo
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 50Gi
    # Scrape all namespaces (not just the monitoring namespace)
    podMonitorNamespaceSelector: {}
    serviceMonitorNamespaceSelector: {}
    ruleNamespaceSelector: {}

    # Additional scrape configs for Confluent Kafka JMX exporter
    additionalScrapeConfigs:
      - job_name: 'confluent-kafka'
        static_configs:
          - targets: ['kafka-jmx-exporter:9404']
        relabel_configs:
          - source_labels: [__address__]
            target_label: kafka_cluster
            replacement: 'prd-kafka'

alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'namespace', 'severity']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: 'pagerduty-critical'
      routes:
        - match:
            severity: critical
          receiver: pagerduty-critical
        - match:
            severity: warning
          receiver: slack-warnings
    receivers:
      - name: pagerduty-critical
        pagerduty_configs:
          - routing_key: PLACEHOLDER_PAGERDUTY_KEY
            description: '{{ range .Alerts }}{{ .Annotations.summary }}\n{{ end }}'
      - name: slack-warnings
        slack_configs:
          - api_url: PLACEHOLDER_SLACK_WEBHOOK
            channel: '#alerts'
            text: '{{ range .Alerts }}{{ .Annotations.description }}\n{{ end }}'

grafana:
  enabled: true
  adminPassword: PLACEHOLDER_GRAFANA_PASSWORD
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
  # Sidecar to auto-load ConfigMap-based dashboards
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      searchNamespace: ALL
  # Additional datasources (Loki, Tempo)
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki-gateway.observability.svc.cluster.local
      access: proxy
    - name: Tempo
      type: tempo
      url: http://tempo-distributor.observability.svc.cluster.local:3100
      access: proxy

# Node Exporter — enabled for Standard GKE node pools
# If using GKE Autopilot, set nodeExporter.enabled: false
# (Autopilot restricts DaemonSet node access)
nodeExporter:
  enabled: true
  tolerations:
    - operator: "Exists"
      effect: "NoSchedule"

# Disable GKE-managed control plane scrapers (not accessible from tenant side)
kubeEtcd:
  enabled: false   # GKE manages etcd

kubeControllerManager:
  enabled: false   # GKE manages control plane

kubeScheduler:
  enabled: false   # GKE manages control plane
