apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: observability
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Wyzard"
data:
  # Dashboard JSON files are loaded here by kustomize configMapGenerator
  # or mounted from the dashboards/ directory.
  # In CI/CD, use:
  #   kubectl create configmap grafana-dashboards \
  #     --from-file=../../dashboards/ \
  #     --dry-run=client -o yaml | kubectl apply -f -
